services:
  db:
    image: pgvector/pgvector:pg16
    container_name: bd2_multimodal_db
    environment:
      POSTGRES_USER: bd2
      POSTGRES_PASSWORD: bd2
      POSTGRES_DB: multimodal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata:
